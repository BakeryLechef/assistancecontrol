<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTENDANCE CONTROL PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #5d4037; --secondary: #795548; --bg: #f5f5f5; --accent: #d7ccc8;
            --text: #2d2621; --white: #ffffff; --danger: #c62828; --success: #2e7d32;
            --gold: #ffd700;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        
        /* LOGIN OVERLAY */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; }
        .login-box input { width: 100%; font-size: 28px; text-align: center; letter-spacing: 8px; margin-bottom: 20px; padding: 10px; border: 2px solid var(--accent); border-radius: 8px; box-sizing: border-box; }

        /* MAIN APP */
        .app-container { width: 100%; max-width: 1200px; background: var(--white); border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; margin: auto; display: none; border: 1px solid var(--primary); }
        .nav-banner { background: #3e2723; color: white; padding: 15px 20px; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: center; border-bottom: 4px solid var(--gold); }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; position: relative; }
        .content { padding: 30px; }
        
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .tab { padding: 12px 25px; cursor: pointer; border: 2px solid var(--primary); background: var(--white); border-radius: 25px; font-weight: bold; color: var(--primary); text-transform: uppercase; transition: 0.3s; }
        .tab.active { background: var(--primary); color: white; }
        
        .section { display: none; }
        .section.active { display: block; }
        
        /* ANALYTICS STYLE */
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .btn { background: var(--primary); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; width: 100%; margin-top: 10px; }
        .btn:hover { background: #4e342e; }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 10000; flex-direction: column; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 20px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--accent); }
        th { background: #efebe9; color: var(--primary); font-weight: bold; }
        
        select, input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--accent); box-sizing: border-box; margin-top: 5px; }
        label { font-weight: bold; font-size: 13px; color: var(--primary); }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div style="border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <h2 style="color:var(--primary)">SYNCING DATABASE...</h2>
</div>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="margin-top:0; color:var(--primary)">SECURITY CHECK</h2>
        <input type="password" id="pin-input" maxlength="4" placeholder="****">
        <button id="unlock-btn" class="btn">UNLOCK SYSTEM</button>
        <p id="login-error" style="color:red; display:none; font-weight:bold; margin-top:10px;">INVALID PIN</p>
    </div>
</div>

<div class="app-container" id="app-main">
    <div class="nav-banner">
        <div style="display:flex; gap:15px; align-items:center;">
            <label style="color:white">COMPANY:</label>
            <select id="main-company" style="width:150px;" onchange="updateDeptOptions(); fullRefresh();">
                <option value="TELEGRAPH">TELEGRAPH</option>
                <option value="PAINTER">PAINTER</option>
                <option value="DATE">DATE</option>
            </select>
            <label style="color:white">DEPARTMENT:</label>
            <select id="main-dept" style="width:200px;" onchange="refreshUI();"></select>
        </div>
    </div>

    <div class="header">
        <h1 id="welcome-title">ATTENDANCE CONTROL</h1>
        <button onclick="location.reload()" style="position:absolute; right:20px; top:20px; background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">LOGOUT</button>
    </div>

    <div class="content">
        <div class="tabs">
            <button class="tab active" onclick="showTab('capture', event)">NEW RECORD</button>
            <button class="tab" onclick="showTab('employees', event)">STAFF LIST</button>
            <button class="tab" onclick="showTab('query', event)">ANALYTICS</button>
        </div>

        <div id="capture" class="section active">
            <div style="max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--accent);">
                <label>EMPLOYEE NAME:</label>
                <select id="sel-employee"></select>
                
                <div style="display: flex; gap: 15px; margin-top: 15px;">
                    <div style="flex: 1;">
                        <label>CONCEPT:</label>
                        <select id="concept" onchange="handleConceptLogic()">
                            <option value="SICK">SICK</option>
                            <option value="PERSONAL">PERSONAL</option>
                            <option value="TARDY">TARDY</option>
                            <option value="LEFT EARLY">LEFT EARLY</option>
                            <option value="VACATIONS">VACATIONS</option>
                            <option value="LOA">LOA</option>
                        </select>
                    </div>
                    <div id="days-wrapper" style="flex: 1;">
                        <label>DAYS:</label>
                        <input type="number" id="days" value="1" min="1" oninput="updateReturnDate()">
                    </div>
                </div>

                <div style="margin-top:15px;"><label>START DATE:</label><input type="date" id="start-date" onchange="updateReturnDate()"></div>
                
                <div id="return-box" style="background: var(--primary); color: white; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-top:15px; font-size: 1.1em; border-bottom: 4px solid var(--gold);">
                    EXPECTED RETURN: <span id="return-date-text">---</span>
                </div>

                <div style="margin-top:15px;">
                    <label>COMMENTS / NOTES:</label>
                    <textarea id="notes" rows="2" placeholder="ADDITIONAL DETAILS..."></textarea>
                </div>

                <button class="btn" onclick="saveRecord()">SAVE ATTENDANCE</button>
            </div>
        </div>

        <div id="employees" class="section">
            <div style="background: #efebe9; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--accent);">
                <h4 style="margin:0 0 10px 0;">REGISTER NEW STAFF</h4>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="new-name" placeholder="ENTER FULL NAME">
                    <button class="btn" style="margin-top:0; width: 150px;" onclick="addEmployee()">ADD</button>
                </div>
            </div>
            <table><thead><tr><th>NAME</th><th>DEPARTMENT</th></tr></thead><tbody id="staff-body"></tbody></table>
        </div>

        <div id="query" class="section">
            <div class="charts-grid">
                <div class="chart-card">
                    <h4 style="margin:0 0 15px 0; text-align:center">CONCEPT DISTRIBUTION</h4>
                    <canvas id="chartConcepts"></canvas>
                </div>
                <div class="chart-card">
                    <h4 style="margin:0 0 15px 0; text-align:center">TOP OFFENDERS (CRITICAL)</h4>
                    <table style="font-size:11px; margin-top:0;"><tbody id="top-offenders"></tbody></table>
                </div>
            </div>
            <h4 style="margin:20px 0 10px 0;">HISTORY LOG (LAST 25)</h4>
            <table><thead><tr><th>DATE</th><th>NAME</th><th>RETURN</th><th>CONCEPT</th><th>NOTES</th></tr></thead><tbody id="logs-body"></tbody></table>
        </div>
    </div>
</div>

<style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzcqO9g2od7E7yK6PlT273PB6r7JqH-IkRBrzFozedLr3t5AgyYh1_kg5SS6EBsQ57PVg/exec";
    
    const DEPARTMENTS = { 
        "TELEGRAPH": ["FROZEN DOUGH AM", "FROZEN DOUGH PM", "BAKING", "COOKIES", "COFFEE BEAN", "MAINTENANCE", "SANITATION", "KANBAN", "WAREHOUSE"], 
        "PAINTER": ["GENERAL"], "DATE": ["GENERAL"] 
    };

    let cloudData = { logs: [], employees: [], users: [] };
    let currentUser = null;
    let myCharts = {};

    document.getElementById('unlock-btn').addEventListener('click', checkLogin);

    async function checkLogin() {
        const pin = document.getElementById('pin-input').value;
        if(!pin) return;
        document.getElementById('loading-overlay').style.display = 'flex';
        
        try {
            const r = await fetch(CLOUD_URL);
            const d = await r.json();
            cloudData = d;
            const user = d.users.find(u => u[1].toString().trim() === pin.trim());
            
            if(user) {
                currentUser = { name: user[0], access: user[2] };
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-main').style.display = 'block';
                document.getElementById('welcome-title').innerText = "PORTAL: " + currentUser.name;
                setupAccess();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        } catch(e) { alert("DATABASE CONNECTION ERROR"); }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function setupAccess() {
        const compSel = document.getElementById('main-company');
        const deptSel = document.getElementById('main-dept');
        if(currentUser.access !== 'ADMIN') {
            compSel.value = "TELEGRAPH"; compSel.disabled = true;
            deptSel.innerHTML = `<option value="${currentUser.access}">${currentUser.access}</option>`;
            deptSel.disabled = true;
        } else {
            updateDeptOptions();
        }
        refreshUI();
    }

    function updateDeptOptions() {
        const comp = document.getElementById('main-company').value;
        const opts = DEPARTMENTS[comp] || ["GENERAL"];
        let h = (currentUser.access === 'ADMIN') ? '<option value="ALL">ALL DEPTS</option>' : '';
        h += opts.map(d => `<option value="${d}">${d}</option>`).join('');
        document.getElementById('main-dept').innerHTML = h;
    }

    async function fullRefresh() {
        document.getElementById('loading-overlay').style.display = 'flex';
        const r = await fetch(CLOUD_URL);
        const d = await r.json();
        cloudData.logs = d.logs; cloudData.employees = d.employees;
        refreshUI();
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function refreshUI() {
        const comp = document.getElementById('main-company').value;
        const dept = document.getElementById('main-dept').value;
        
        const fEmps = cloudData.employees.filter(e => e[1] === comp && (dept === 'ALL' || e[2] === dept));
        document.getElementById('sel-employee').innerHTML = fEmps.map(e => `<option value="${e[0]}">${e[0]}</option>`).join('');
        document.getElementById('staff-body').innerHTML = fEmps.map(e => `<tr><td>${e[0]}</td><td>${e[2]}</td></tr>`).join('');
        
        const fLogs = cloudData.logs.filter(l => l[0] === comp && (dept === 'ALL' || l[1] === dept));
        document.getElementById('logs-body').innerHTML = fLogs.slice(-25).reverse().map(l => `
            <tr><td>${l[3].split('T')[0]}</td><td><b>${l[2]}</b></td><td>${l[6]}</td><td>${l[4]}</td><td>${l[7]||''}</td></tr>
        `).join('');
        
        updateAnalytics(fLogs);
    }

    function handleConceptLogic() {
        const c = document.getElementById('concept').value;
        const wrapper = document.getElementById('days-wrapper');
        const retBox = document.getElementById('return-box');
        if(c === 'TARDY' || c === 'LEFT EARLY') {
            wrapper.style.visibility = 'hidden'; retBox.style.display = 'none';
        } else {
            wrapper.style.visibility = 'visible'; retBox.style.display = 'block';
            updateReturnDate();
        }
    }

    function updateReturnDate() {
        const s = document.getElementById('start-date').value;
        const d = parseInt(document.getElementById('days').value) || 1;
        if(!s) return;
        let cur = new Date(s + 'T00:00:00');
        let added = 0;
        while(added < d) {
            cur.setDate(cur.getDate() + 1);
            if(cur.getDay() !== 0 && cur.getDay() !== 6) added++;
        }
        document.getElementById('return-date-text').innerText = cur.toISOString().split('T')[0];
    }

    async function saveRecord() {
        const name = document.getElementById('sel-employee').value;
        const date = document.getElementById('start-date').value;
        const concept = document.getElementById('concept').value;
        if(!name || !date) return alert("MISSING DATA");
        
        document.getElementById('loading-overlay').style.display = 'flex';
        const payload = {
            action: "saveLog",
            company: document.getElementById('main-company').value,
            dept: document.getElementById('main-dept').value,
            name: name, rawDate: date, concept: concept,
            days: (concept === 'TARDY' || concept === 'LEFT EARLY') ? 0 : document.getElementById('days').value,
            return: (concept === 'TARDY' || concept === 'LEFT EARLY') ? "N/A" : document.getElementById('return-date-text').innerText,
            notes: document.getElementById('notes').value.toUpperCase()
        };
        try {
            await fetch(CLOUD_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("SAVED!");
            document.getElementById('notes').value = "";
            fullRefresh();
        } catch(e) { alert("ERROR"); }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function updateAnalytics(data) {
        const counts = {}, offenders = {};
        const critical = ['SICK', 'PERSONAL', 'TARDY', 'LEFT EARLY'];
        data.forEach(l => { 
            counts[l[4]] = (counts[l[4]] || 0) + 1;
            if(critical.includes(l[4])) offenders[l[2]] = (offenders[l[2]] || 0) + 1;
        });
        const sorted = Object.entries(offenders).sort((a,b)=>b[1]-a[1]).slice(0,8);
        document.getElementById('top-offenders').innerHTML = sorted.map(([n,c])=>`<tr><td>${n}</td><td><b>${c} Records</b></td></tr>`).join('');
        if(myCharts.c1) myCharts.c1.destroy();
        myCharts.c1 = new Chart(document.getElementById('chartConcepts'), {
            type: 'doughnut',
            data: { 
                labels: Object.keys(counts), 
                datasets: [{ data: Object.values(counts), backgroundColor: ['#c62828', '#f57c00', '#2e7d32', '#5d4037', '#0277bd', '#9c27b0'] }] 
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });
    }

    async function addEmployee() {
        const name = document.getElementById('new-name').value.trim().toUpperCase();
        if(!name) return;
        const dept = document.getElementById('main-dept').value;
        if(dept === 'ALL') return alert("SELECT DEPT");
        document.getElementById('loading-overlay').style.display = 'flex';
        await fetch(CLOUD_URL, { method: "POST", body: JSON.stringify({ action: "addEmployee", name, company: document.getElementById('main-company').value, dept }) });
        document.getElementById('new-name').value = "";
        fullRefresh();
    }

    function showTab(id, e) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
