<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM SECURE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #5d4037; --bg: #f5f5f5; --text: #2d2621; --accent: #d7ccc8; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 300px; }
        .login-box input { width: 100%; font-size: 24px; text-align: center; margin-bottom: 20px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; }
        .btn { background: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; color: white; z-index: 10000; }
        .app-container { display: none; background: white; border-radius: 15px; overflow: hidden; max-width: 1100px; margin: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .section { display: none; }
        .active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div id="loading-overlay"><h2>CONECTANDO... ESPERE</h2></div>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:var(--primary)">SECURE ACCESS</h2>
        <input type="password" id="pin-input" placeholder="PIN">
        <button id="unlock-button" class="btn">UNLOCK</button>
        <p id="error-msg" style="color:red; display:none; margin-top:10px;">PIN INCORRECTO</p>
    </div>
</div>

<div class="app-container" id="app-main">
    <div class="header">
        <h1 id="welcome-user">BIENVENIDO</h1>
        <button onclick="location.reload()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">LOGOUT</button>
    </div>
    <div class="content">
        <div style="margin-bottom:20px; background:#eee; padding:15px; border-radius:10px;">
            <label>PLANTA:</label>
            <select id="main-company" onchange="refreshUI()">
                <option value="TELEGRAPH">TELEGRAPH</option>
                <option value="PAINTER">PAINTER</option>
                <option value="DATE">DATE</option>
            </select>
            <label> DEPTO:</label>
            <select id="main-dept" onchange="refreshUI()"></select>
        </div>
        
        <div id="capture" class="section active">
            <h3>REGISTRAR ASISTENCIA</h3>
            <select id="sel-employee"></select>
            <select id="concept" style="margin-top:10px;">
                <option value="SICK">SICK</option>
                <option value="PERSONAL">PERSONAL</option>
                <option value="TARDY">TARDY</option>
                <option value="LEFT EARLY">LEFT EARLY</option>
                <option value="VACATIONS">VACATIONS</option>
            </select>
            <input type="date" id="start-date" style="margin-top:10px; width:100%; padding:10px; box-sizing:border-box;">
            <button class="btn" style="margin-top:15px;" onclick="saveRecord()">GUARDAR REGISTRO</button>
        </div>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzcqO9g2od7E7yK6PlT273PB6r7JqH-IkRBrzFozedLr3t5AgyYh1_kg5SS6EBsQ57PVg/exec";
    
    const DEPARTMENTS = { 
        "TELEGRAPH": ["FROZEN DOUGH AM", "FROZEN DOUGH PM", "BAKING", "COOKIES", "COFFEE BEAN", "MAINTENANCE", "SANITATION", "KANBAN", "WAREHOUSE"], 
        "PAINTER": ["GENERAL"], "DATE": ["GENERAL"] 
    };

    let cloudData = { logs: [], employees: [], users: [] };
    let currentUser = null;

    // FORZAMOS EL BOTÓN POR ID PARA QUE NO HAYA FALLO DE CLIC
    document.getElementById('unlock-button').addEventListener('click', checkLogin);

    async function checkLogin() {
        const pin = document.getElementById('pin-input').value;
        if(!pin) { alert("INGRESE SU PIN"); return; }
        
        document.getElementById('loading-overlay').style.display = 'flex';
        document.getElementById('error-msg').style.display = 'none';

        try {
            const r = await fetch(CLOUD_URL);
            const d = await r.json();
            cloudData = d;
            
            // Buscamos al usuario comparando el PIN como texto
            const user = d.users.find(u => u[1].toString().trim() === pin.trim());
            
            if(user) {
                currentUser = { name: user[0], access: user[2] };
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-main').style.display = 'block';
                document.getElementById('welcome-user').innerText = "BIENVENIDO: " + currentUser.name;
                setupInitialView();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        } catch(e) {
            console.error(e);
            alert("ERROR DE CONEXIÓN: Revisa que tu Excel esté en 'Cualquier persona'.");
        }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function setupInitialView() {
        const compSel = document.getElementById('main-company');
        const deptSel = document.getElementById('main-dept');
        
        if(currentUser.access !== 'ADMIN') {
            compSel.value = "TELEGRAPH";
            compSel.disabled = true;
            deptSel.innerHTML = `<option value="${currentUser.access}">${currentUser.access}</option>`;
            deptSel.disabled = true;
        } else {
            updateDeptOptions();
        }
        refreshUI();
    }

    function updateDeptOptions() {
        const comp = document.getElementById('main-company').value;
        const opts = DEPARTMENTS[comp] || ["GENERAL"];
        document.getElementById('main-dept').innerHTML = opts.map(d => `<option value="${d}">${d}</option>`).join('');
    }

    function refreshUI() {
        const comp = document.getElementById('main-company').value;
        const dept = document.getElementById('main-dept').value;
        const fEmps = cloudData.employees.filter(e => e[1] === comp && e[2] === dept);
        document.getElementById('sel-employee').innerHTML = fEmps.map(e => `<option value="${e[0]}">${e[0]}</option>`).join('');
    }

    async function saveRecord() {
        const name = document.getElementById('sel-employee').value;
        const date = document.getElementById('start-date').value;
        if(!name || !date) return alert("LLENE TODOS LOS CAMPOS");
        
        document.getElementById('loading-overlay').style.display = 'flex';
        const payload = {
            action: "saveLog",
            company: document.getElementById('main-company').value,
            dept: document.getElementById('main-dept').value,
            name: name,
            rawDate: date,
            concept: document.getElementById('concept').value,
            days: 1, return: "N/A", notes: "WEB REG"
        };
        
        await fetch(CLOUD_URL, { method: "POST", body: JSON.stringify(payload) });
        alert("GUARDADO CORRECTAMENTE");
        location.reload();
    }
</script>
</body>
</html>
